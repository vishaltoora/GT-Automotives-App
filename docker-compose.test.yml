# Throwaway Postgres for backend integration tests.
# Runs on port 5433 (not the default 5432) so it never collides with a local
# dev database. The database name contains "test" — the integration global
# setup refuses to run against any DB whose name lacks "test".
#
#   docker compose -f docker-compose.test.yml up -d
#   DATABASE_URL="postgresql://postgres:postgres@localhost:5433/gt_automotive_test?schema=public" yarn test:server:integration
#   docker compose -f docker-compose.test.yml down -v
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: gt-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gt_automotive_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gt_automotive_test']
      interval: 3s
      timeout: 5s
      retries: 20
